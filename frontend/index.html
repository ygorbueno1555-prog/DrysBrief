<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortiq Decision Copilot</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- Skip link (acessibilidade) -->
<a href="#report-content" class="skip-link">Pular para análise</a>

<!-- ── HEADER ──────────────────────────────────────────── -->
<header>
  <div class="logo">C<span>ORTIQ</span></div>
  <div class="header-subtitle">Decision Copilot</div>
  <div class="header-badge">ALPHA</div>
  <a href="/briefing" class="header-brief-link">Portfolio Watch →</a>
</header>

<!-- ── CONTAINER ───────────────────────────────────────── -->
<div class="container">

  <!-- Mode tabs -->
  <div class="mode-tabs" role="tablist" aria-label="Modo de análise">
    <button class="mode-tab active" role="tab" aria-selected="true"  data-mode="equity"  type="button">⬡ Equity</button>
    <button class="mode-tab"        role="tab" aria-selected="false" data-mode="startup" type="button">◈ Startup</button>
    <button class="mode-tab"        role="tab" aria-selected="false" data-mode="history" type="button">▦ Histórico</button>
  </div>

  <!-- Panels -->
  <div class="panels" id="panels">

    <!-- ── INPUT PANEL ──────────────────────────────────── -->
    <aside class="input-panel" id="input-panel">

      <!-- EQUITY FORM -->
      <div id="equity-form" class="form-section" role="tabpanel" aria-label="Formulário equity">
        <div class="form-title">Equity Analysis</div>

        <div class="field">
          <label for="ticker">Ativo</label>
          <input id="ticker" type="text" placeholder="VALE3, PETR4, ITUB4..." autocomplete="off" />
        </div>

        <div class="field">
          <label for="thesis">Tese atual <span class="opt">— opcional</span></label>
          <textarea id="thesis" placeholder="Ex: VALE3 se beneficia da recuperação da demanda chinesa por minério de ferro..."></textarea>
        </div>

        <div class="field">
          <label for="mandate">Mandato da carteira <span class="opt">— opcional</span></label>
          <input id="mandate" type="text" placeholder="Ex: long-only, value, 3-5 anos..." />
        </div>

        <button class="btn-analyze" id="btn-equity" type="button">ANALISAR →</button>
      </div>

      <!-- STARTUP FORM -->
      <div id="startup-form" class="form-section" role="tabpanel" aria-label="Formulário startup" style="display:none;">
        <div class="form-title">Startup Due Diligence</div>

        <div class="field">
          <label for="startup-name">Startup</label>
          <input id="startup-name" type="text" placeholder="Nome da empresa..." autocomplete="off" />
        </div>

        <div class="field">
          <label for="startup-url">Website <span class="opt">— opcional</span></label>
          <input id="startup-url" type="text" placeholder="https://..." />
        </div>

        <div class="field">
          <label for="startup-thesis">Tese de investimento <span class="opt">— opcional</span></label>
          <textarea id="startup-thesis" placeholder="Ex: Único CRM conversacional nativo para WhatsApp no Brasil, targeting PMEs..."></textarea>
        </div>

        <button class="btn-analyze" id="btn-startup" type="button">ANALISAR →</button>
      </div>

      <!-- STATUS / QUERIES -->
      <div id="status-panel" class="status-panel" aria-live="polite" aria-label="Status da análise">
        <div class="status-row">
          <div class="status-dot pulse" id="status-dot" aria-hidden="true"></div>
          <div class="status-text" id="status-text">Iniciando...</div>
        </div>
        <div class="queries-list" id="queries-list" role="list"></div>
      </div>

      <!-- HISTÓRICO SIDEBAR -->
      <div id="history-panel" class="history-panel">
        <div class="history-header">
          <span class="history-title">HISTÓRICO</span>
          <button class="history-clear" id="btn-clear-history" type="button"
                  title="Limpar histórico" aria-label="Limpar histórico">×</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </div>

    </aside>

    <!-- ── OUTPUT PANEL ──────────────────────────────────── -->
    <section class="output-panel" aria-label="Resultado da análise">

      <!-- Verdict bar -->
      <div class="verdict-bar" id="verdict-bar" aria-live="assertive">
        <div class="verdict-tag blue" id="verdict-tag">ANALISANDO</div>
        <div class="verdict-meta" id="verdict-meta"></div>
        <div class="verdict-time" id="verdict-time"></div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" aria-label="Nenhuma análise ativa">
        <div class="empty-icon" aria-hidden="true">◈</div>
        <p>Selecione o modo, preencha os dados e clique em Analisar</p>
        <div class="hint">equity · startup · auto-research · decision layer</div>
      </div>

      <!-- Cache hint banner -->
      <div id="cache-hint" class="cache-hint" style="display:none;" role="status">
        <div class="cache-hint-left">
          <span class="cache-icon" aria-hidden="true">🕐</span>
          <span id="cache-hint-text"></span>
        </div>
        <div class="cache-hint-actions">
          <button class="cache-btn-view" id="btn-view-cache" type="button">Ver análise anterior</button>
          <button class="cache-btn-rerun" id="btn-rerun" type="button">Reanalisar</button>
        </div>
      </div>

      <!-- Report -->
      <div class="report-wrapper" id="report-wrapper">
        <div class="report-content" id="report-content" aria-label="Relatório de análise"></div>
      </div>

      <!-- History view (tab mode) -->
      <div class="history-view" id="history-view" role="tabpanel" aria-label="Histórico de análises"></div>

    </section>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
